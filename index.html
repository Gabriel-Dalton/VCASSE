<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCASSE | Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="dev/img/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background on right half ── */
    .bg-grid {
      position: fixed;
      top: 0;
      right: 0;
      width: 55%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-grid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* Floating node dots on the grid */
    .bg-grid::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 64px 64px;
      background-position: 32px 32px;
    }

    /* Soft glow to give depth */
    .bg-glow {
      position: fixed;
      top: 20%;
      right: 10%;
      width: 500px;
      height: 500px;
      background: rgba(13, 79, 139, 0.08);
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 64px;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav img {
      width: 32px;
      height: 32px;
      border-radius: 7px;
    }

    .nav span {
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #fafafa;
    }

    /* ── Main content ── */
    .content {
      max-width: 580px;
    }

    .label {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 32px;
    }

    h1 {
      font-size: clamp(40px, 5.5vw, 72px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -2px;
      color: #fafafa;
      margin-bottom: 32px;
    }

    h1 .thin {
      font-weight: 300;
      color: #71717a;
    }

    .desc {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.65;
      color: #a1a1aa;
      max-width: 460px;
    }

    /* ── Footer ── */
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #52525b;
      letter-spacing: 0.5px;
    }

    .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .copyright {
      font-size: 13px;
      color: #3f3f46;
    }

    .copyright a {
      color: #52525b;
      text-decoration: none;
      transition: color 0.2s;
    }

    .copyright a:hover {
      color: #a1a1aa;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page {
        padding: 32px 28px;
      }

      .bg-grid {
        width: 100%;
        opacity: 0.4;
      }

      h1 {
        letter-spacing: -1px;
      }

      .bottom {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="page">

    <nav class="nav">
      <img src="dev/img/logo.svg" alt="VCASSE">
      <span>VCASSE</span>
    </nav>

    <main class="content">
      <p class="label">Coming soon</p>
      <h1>
        Responsible AI<br>
        for <span class="thin">Vancouver.</span>
      </h1>
      <p class="desc">
        The Vancouver Centre for AI Safety, Sustainability, and Ethics.
        Research, education, and advocacy — launching&nbsp;soon.
      </p>
    </main>

    <footer class="bottom">
      <div class="status">
        <span class="dot"></span>
        Building in progress
      </div>
      <p class="copyright">
        &copy; <script>document.write(new Date().getFullYear())</script> VCASSE.
        A subsidiary of <a href="https://oasisofchange.com" target="_blank">Oasis of Change, Inc.</a>
      </p>
    </footer>

  </div>

</body>
</html>
