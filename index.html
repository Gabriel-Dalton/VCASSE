<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCASSE | Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="dev/img/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d4f8b;
      --primary-light: #1a6db5;
      --primary-dark: #082a4d;
      --bg-dark: #051a2e;
      --white: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'IBM Plex Sans', var(--font-sans);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated background */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(13, 79, 139, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(26, 109, 181, 0.1) 0%, transparent 60%);
      animation: drift 20s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-3%, 2%) rotate(2deg); }
    }

    .coming-soon {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 32px;
      max-width: 640px;
      width: 100%;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 56px;
    }

    .logo img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
    }

    .logo span {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white);
    }

    .tagline {
      font-family: var(--font-display);
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .tagline .accent {
      font-style: italic;
      background: linear-gradient(135deg, #6cb4e4, #1a6db5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 48px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.3px;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.04);
    }

    .pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6cb4e4;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    .pillars {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .pillar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .pillar svg {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    .footer-note {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      z-index: 1;
    }

    .footer-note a {
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-note a:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 480px) {
      .coming-soon { padding: 32px 24px; }
      .logo { margin-bottom: 40px; }
      .pillars { gap: 20px; }
      .description { font-size: 15px; }
      .footer-note { bottom: 20px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <main class="coming-soon">
    <div class="logo">
      <img src="dev/img/logo.svg" alt="VCASSE logo">
      <span>VCASSE</span>
    </div>

    <h1 class="tagline">
      Something meaningful<br>is <span class="accent">coming soon.</span>
    </h1>

    <p class="description">
      The Vancouver Centre for AI Safety, Sustainability, and Ethics is
      building a home for responsible AI research, education, and advocacy.
    </p>

    <div class="pillars">
      <div class="pillar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Safety
      </div>
      <div class="pillar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 6.5c0 5.5-4.5 7-8 7.5z"/><path d="M6 22c1.5-6.5 6.5-10 11-11"/></svg>
        Sustainability
      </div>
      <div class="pillar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M4 6h16M7 6l-3 7h6zM17 6l3 7h-6zM9 22h6"/></svg>
        Ethics
      </div>
    </div>

    <div class="pill">
      <span class="dot"></span>
      Under development
    </div>
  </main>

  <footer class="footer-note">
    &copy; <script>document.write(new Date().getFullYear())</script> VCASSE.
    A subsidiary of <a href="https://oasisofchange.org" target="_blank" rel="noopener noreferrer">Oasis of Change, Inc.</a>
  </footer>

</body>
</html>
