        - heading "Practical AI Safety Evaluations for Public-Interest Teams" [level=1] [ref=e35]
        - paragraph [ref=e36]: A practical framework for evaluating model failure modes before deployment in civic and public-service contexts.
        - list [ref=e37]:
          - listitem [ref=e38]:
            - generic [ref=e39]: Published
            - strong [ref=e40]: Mar 15, 2026
          - listitem [ref=e41]:
            - generic [ref=e42]: Reading
            - strong [ref=e43]: 7 min
          - listitem [ref=e44]:
            - generic [ref=e45]: Authors
            - strong [ref=e46]: Dr. Mei Tanaka, Priya Sandhu
      - figure [ref=e47]:
        - img "Concentric ring illustration representing layered AI evaluation rounds" [ref=e48]
  - generic [ref=e50]:
    - article [ref=e51]:
      - paragraph [ref=e52]: AI evaluations should be understandable, repeatable, and proportionate to risk. For most public-interest teams, the challenge is not whether to evaluate systems, but how to do it with limited staff and budget — and how to communicate the result so that residents, elected officials, and journalists can engage with it.
      - heading "The lightweight evaluation loop" [level=2] [ref=e53]
      - paragraph [ref=e54]: "VCASSE recommends a four-step loop you can run on a single sprint:"
      - list [ref=e55]:
        - listitem [ref=e56]:
          - strong [ref=e57]: Define high-impact failure classes
          - text: with the team that will be accountable for the system in production.
        - listitem [ref=e58]:
          - strong [ref=e59]: Design representative test sets
          - text: that reflect Vancouver's languages, neighbourhoods, accessibility needs, and edge cases.
        - listitem [ref=e60]:
          - strong [ref=e61]: Review findings with non-technical stakeholders
          - text: — service designers, frontline staff, and at least one external civic partner.
        - listitem [ref=e62]:
          - strong [ref=e63]: Publish plain-language summaries
          - text: that pair each metric with a short, honest interpretation.
      - heading "What to test for first" [level=2] [ref=e64]
      - paragraph [ref=e65]: "Public-interest deployments tend to fail along a small set of recurring axes: language coverage, demographic skew, refusal under stress, and brittle behaviour around novel jurisdictional inputs. Starting evaluations there closes the most common gaps before the system reaches a real applicant."
      - heading "Why the public summary matters" [level=2] [ref=e66]
      - paragraph [ref=e67]: A test report that no one outside the engineering team reads cannot create accountability. Plain-language summaries give policymakers and residents a shared reference, and they make it possible to compare deployments across departments and vendors.
      - blockquote [ref=e68]: "\"If you can't describe a failure mode in two sentences a city councillor would understand, you haven't tested for it yet.\""
      - heading "Where to go from here" [level=2] [ref=e69]
      - paragraph [ref=e70]: This brief is the first in a series. Upcoming notes will cover red-teaming for civic chatbots, evaluation cadence after deployment, and how to share evaluation infrastructure across municipalities.
    - complementary "Publication summary" [ref=e71]:
      - generic [ref=e72]:
        - heading "Key takeaways" [level=3] [ref=e73]
        - list [ref=e74]:
          - listitem [ref=e75]: Run a four-step evaluation loop sized for small public teams.
          - listitem [ref=e76]: Test first for language coverage, demographic skew, refusal, and novel input behaviour.
          - listitem [ref=e77]: Publish plain-language summaries alongside any metric.
          - listitem [ref=e78]: Treat evaluation reports as governance artefacts, not engineering memos.
