        - generic [ref=e31]: Safety
        - heading "Practical AI Safety Evaluations for Public-Interest Teams" [level=1] [ref=e32]
        - paragraph [ref=e33]: A practical framework for evaluating model failure modes before deployment in civic and public-service contexts.
        - list [ref=e34]:
          - listitem [ref=e35]:
            - generic [ref=e36]: Published
            - strong [ref=e37]: Mar 15, 2026
          - listitem [ref=e38]:
            - generic [ref=e39]: Reading
            - strong [ref=e40]: 7 min
          - listitem [ref=e41]:
            - generic [ref=e42]: Authors
            - strong [ref=e43]: Dr. Mei Tanaka, Priya Sandhu
      - figure [ref=e44]:
        - img "Concentric ring illustration representing layered AI evaluation rounds" [ref=e45]
  - generic [ref=e47]:
    - article [ref=e48]:
      - paragraph [ref=e49]: AI evaluations should be understandable, repeatable, and proportionate to risk. For most public-interest teams, the challenge is not whether to evaluate systems, but how to do it with limited staff and budget — and how to communicate the result so that residents, elected officials, and journalists can engage with it.
      - heading "The lightweight evaluation loop" [level=2] [ref=e50]
      - paragraph [ref=e51]: "VCASSE recommends a four-step loop you can run on a single sprint:"
      - list [ref=e52]:
        - listitem [ref=e53]:
          - strong [ref=e54]: Define high-impact failure classes
          - text: with the team that will be accountable for the system in production.
        - listitem [ref=e55]:
          - strong [ref=e56]: Design representative test sets
          - text: that reflect Vancouver's languages, neighbourhoods, accessibility needs, and edge cases.
        - listitem [ref=e57]:
          - strong [ref=e58]: Review findings with non-technical stakeholders
          - text: — service designers, frontline staff, and at least one external civic partner.
        - listitem [ref=e59]:
          - strong [ref=e60]: Publish plain-language summaries
          - text: that pair each metric with a short, honest interpretation.
      - heading "What to test for first" [level=2] [ref=e61]
      - paragraph [ref=e62]: "Public-interest deployments tend to fail along a small set of recurring axes: language coverage, demographic skew, refusal under stress, and brittle behaviour around novel jurisdictional inputs. Starting evaluations there closes the most common gaps before the system reaches a real applicant."
      - heading "Why the public summary matters" [level=2] [ref=e63]
      - paragraph [ref=e64]: A test report that no one outside the engineering team reads cannot create accountability. Plain-language summaries give policymakers and residents a shared reference, and they make it possible to compare deployments across departments and vendors.
      - blockquote [ref=e65]: "\"If you can't describe a failure mode in two sentences a city councillor would understand, you haven't tested for it yet.\""
      - heading "Where to go from here" [level=2] [ref=e66]
      - paragraph [ref=e67]: This brief is the first in a series. Upcoming notes will cover red-teaming for civic chatbots, evaluation cadence after deployment, and how to share evaluation infrastructure across municipalities.
    - complementary "Publication summary" [ref=e68]:
      - generic [ref=e69]:
        - heading "Key takeaways" [level=3] [ref=e70]
        - list [ref=e71]:
          - listitem [ref=e72]: Run a four-step evaluation loop sized for small public teams.
          - listitem [ref=e73]: Test first for language coverage, demographic skew, refusal, and novel input behaviour.
          - listitem [ref=e74]: Publish plain-language summaries alongside any metric.
          - listitem [ref=e75]: Treat evaluation reports as governance artefacts, not engineering memos.
