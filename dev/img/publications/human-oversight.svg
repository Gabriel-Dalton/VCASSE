  </defs>
  <rect width="800" height="450" fill="url(#oversight-bg)"/>
  <g fill="none" stroke="rgba(207,226,243,0.2)" stroke-width="1">
    <path d="M-40 370 Q200 260 420 360 T860 330"/>
